name: Rebuild Dashboard

# Manual trigger only — gives you a "Run workflow" button in the GitHub UI
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you rebuilding? (optional note)'
        required: false
        default: 'Manual refresh'
  schedule:
    - cron: '0 22 * * *'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl numpy google-api-python-client google-auth

      - name: Download Excel and rebuild JSON
        env:
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          OUTPUT_DIR: public
        run: python scripts/build.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/projects.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rebuild dashboard data ($(date -u +%Y-%m-%d_%H:%M)) — ${{ inputs.reason }}"
            git push
          fi
